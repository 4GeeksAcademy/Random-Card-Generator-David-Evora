<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="./assets/img/4geeks.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador de Cartas Aleatorias</title>
  </head>
  <body>
    <main class="page">
      <section class="card-wrapper">
        <div class="playing-card" data-card aria-live="polite">
          <div class="card-corner top" data-card-suit-top></div>
          <div class="card-value" data-card-value></div>
          <div class="card-corner bottom" data-card-suit-bottom></div>
        </div>
        <button class="draw-button" type="button" data-draw-button>
          Sacar otra carta
        </button>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
